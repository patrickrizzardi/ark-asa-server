# ARK: Survival Ascended — shared-economy server stack.
# MariaDB backs the ArkShop shared economy store; the modded AsaApi + plugin services are not present yet.
#
# The config dir is a HOST bind mount on purpose: edit ./config/GameUserSettings.ini,
# restart, and you're back in ~1 min. That's the whole point of the local sandbox.

services:
  # Sets the host kernel mmap limit ASA needs, or the server crash-loops (exit code 21).
  # vm.max_map_count is non-namespaced, so a privileged container writes it to the HOST
  # kernel, then exits. Runs before the server on every `up` — WSL or VPS, no manual step.
  sysctl:
    image: busybox:stable
    command: sysctl -w vm.max_map_count=262144
    privileged: true
    network_mode: none
    restart: "no"

  # MariaDB 11.4 (LTS) backs the ArkShop shared economy store. Internal to the compose
  # network only — no host port published. ArkShop connects via service name `mariadb:3306`.
  # MariaDB is required over MySQL ≥8.0.28: ArkShop's client lib rejects that version range
  # (see docs/internal/decisions/0001-db-engine-mariadb.md).
  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?set MARIADB_ROOT_PASSWORD in your env file}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-arkshop}
      MARIADB_USER: ${MARIADB_USER:-arkshop}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?set MARIADB_PASSWORD in your env file}
    volumes:
      - ark-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  the-island:
    build: .
    image: ark-asa:latest
    container_name: ark-the-island
    depends_on:
      sysctl:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
    ports:
      - "7777:7777/udp"      # game + query
      - "27020:27020/tcp"    # RCON
    environment:
      SERVER_MAP: ${SERVER_MAP:-TheIsland_WP}
      SESSION_NAME: ${SESSION_NAME:-ARK-Test}
      MAX_PLAYERS: ${MAX_PLAYERS:-10}
      ARK_ADMIN_PASSWORD: ${ARK_ADMIN_PASSWORD:?set ARK_ADMIN_PASSWORD in your env file}
      UPDATE_ON_BOOT: ${UPDATE_ON_BOOT:-0}
      SAVE_ON_STOP: ${SAVE_ON_STOP:-0}
      ENABLE_BATTLEYE: ${ENABLE_BATTLEYE:-0}
      MODS: ${MODS:-}
      WINEDEBUG: ${WINEDEBUG:--all}   # -all = clean logs; set +err,+seh to debug a crash
    volumes:
      - ark-game:/home/container/arkserver   # game files + proton prefix + saves (persist → fast boot)
      - ./config:/home/container/config      # YOUR ini files — edit on host, restart. Bound SHALLOW on purpose:
                                             # a deep bind into …/Saved/Config/WindowsServer makes Docker root-create
                                             # the volume's intermediate dirs, blocking the non-root user from writing
                                             # Logs/saves. The entrypoint symlinks this into the engine's config path.
    stop_grace_period: ${STOP_GRACE_PERIOD:-30s}   # test=0s insta-kill, prod=30s for SaveWorld
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ark-game:
    name: ark-game
  ark-db:
    name: ark-db
